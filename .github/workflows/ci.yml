name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: "3.14"
      - name: Install project
        run: uv sync --frozen --all-groups
      - name: ruff check
        run: uv run ruff check
      - name: ruff format --check
        run: uv run ruff format --check
      - name: mypy
        run: uv run mypy src tests
      - name: pyright
        run: uv run pyright

  test-stable:
    name: Test (ubuntu / Python ${{ matrix.python-version }})
    needs: [lint]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: ${{ matrix.python-version }}
      - name: Install project
        run: uv sync --frozen --all-groups
      - name: pytest
        run: uv run pytest --cov=reget --cov-report=xml --cov-report=term

  test-prospective:
    name: Test (ubuntu / Python 3.15-dev, experimental)
    needs: [lint]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.15-dev"
      - name: Install project
        # Unfrozen: lock may not yet resolve for pre-release interpreters.
        run: uv sync --all-groups
      - name: pytest
        run: uv run pytest --cov=reget --cov-report=xml --cov-report=term

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: [lint, test-stable]
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build
        run: uv build
      - name: Check distribution metadata
        run: |
          uv tool install twine
          uvx twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
